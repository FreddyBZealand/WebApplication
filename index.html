<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <title>DR Musiksamling</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- CSS -->
    <style>
        body { background-color: #f5f5f5; }
        h1 { color: #cc0000; }
        thead { background-color: #cc0000; color: white; }
    </style>
</head>
<body>
<div id="app" class="container mt-4">

    <h1>DR Musiksamling</h1>
    <hr />

    <!-- LOGIN -->
    <div class="card p-3 mb-3" v-if="!token">
        <h5>Login</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input class="form-control" type="text" placeholder="Brugernavn" v-model="username" />
            </div>
            <div class="col-md-3">
                <input class="form-control" type="password" placeholder="Adgangskode" v-model="password" />
            </div>
            <div class="col-md-2">
                <button class="btn btn-danger w-100" v-on:click="login()">Log ind</button>
            </div>
        </div>
        <p class="text-danger mt-2" v-if="loginFejl">{{ loginFejl }}</p>
    </div>

    <!-- LOGGET IND -->
    <div class="card p-3 mb-3" v-if="token">
        <div class="d-flex justify-content-between align-items-center">
            <span class="text-success">Logget ind som <strong>{{ bruger }}</strong></span>
            <button class="btn btn-outline-danger btn-sm" v-on:click="logout()">Log ud</button>
        </div>
    </div>

    <!-- SØG -->
    <div class="card p-3 mb-3">
        <h5>Søg efter plader</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input class="form-control" type="text" placeholder="Titel" v-model="sogTitel" />
            </div>
            <div class="col-md-3">
                <input class="form-control" type="text" placeholder="Artist" v-model="sogArtist" />
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100" v-on:click="hentPlader()">Søg</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" v-on:click="rydSog()">Ryd</button>
            </div>
        </div>
    </div>

    <!-- TILFØJ (kun logget ind) -->
    <div class="card p-3 mb-3" v-if="token">
        <h5>Tilføj ny plade</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input class="form-control" type="text" placeholder="Titel" v-model="nyTitel" />
            </div>
            <div class="col-md-3">
                <input class="form-control" type="text" placeholder="Artist" v-model="nyArtist" />
            </div>
            <div class="col-md-2">
                <input class="form-control" type="number" placeholder="Varighed (sek)" v-model="nyVarighed" />
            </div>
            <div class="col-md-2">
                <input class="form-control" type="number" placeholder="År" v-model="nyAar" />
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" v-on:click="tilfoej()">Tilføj</button>
            </div>
        </div>
    </div>

    <!-- LISTE -->
    <div class="card p-3">
        <h5>Musikplader</h5>
        <p class="text-muted" v-if="plader.length === 0">Ingen plader fundet.</p>
        <table class="table table-striped" v-if="plader.length > 0">
            <thead>
                <tr>
                    <th>Titel</th>
                    <th>Artist</th>
                    <th>Varighed</th>
                    <th>År</th>
                    <th v-if="token">Slet</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="plade in plader" v-bind:key="plade.id">
                    <td>{{ plade.title }}</td>
                    <td>{{ plade.artist }}</td>
                    <td>{{ plade.duration }} sek</td>
                    <td>{{ plade.year }}</td>
                    <td v-if="token">
                        <button class="btn btn-sm btn-danger" v-on:click="slet(plade.id)">Slet</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script src="index.js"></script>
</body>
</html>
